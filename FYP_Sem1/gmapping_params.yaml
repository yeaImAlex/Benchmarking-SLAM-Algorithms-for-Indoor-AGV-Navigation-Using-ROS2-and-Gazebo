slam_gmapping:
  ros__parameters:
    use_sim_time: True

    # Frames (match your TF tree)
    base_frame: base_footprint
    odom_frame: odom
    map_frame: map

    # Laser topic (your scan is /scan)
    scan_topic: scan

    # Mapping behavior (reasonable defaults)
    maxUrange: 3.0          # must be <= your lidar max useful range
    maxRange: 3.5
    minimumScore: 50
    sigma: 0.05
    kernelSize: 1
    lstep: 0.05
    astep: 0.05
    iterations: 5
    lsigma: 0.075
    ogain: 3.0

    # Update thresholds
    linearUpdate: 0.25
    angularUpdate: 0.2
    temporalUpdate: 0.5

    # Map resolution (keep fair with your locked nav2 costmap resolution)
    delta: 0.05

    # Particles
    particles: 30
